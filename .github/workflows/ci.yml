name: CI

on:
  push:
  pull_request:

jobs:
  guardrails:
    name: Guardrails / static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check_forbidden_refs.sh
        run: bash scripts/guards/check_forbidden_refs.sh

      - name: check_no_secrets_or_phi.sh
        run: bash scripts/guards/check_no_secrets_or_phi.sh

      - name: check_action_effects_consistency.sh
        run: bash scripts/guards/check_action_effects_consistency.sh

      - name: Extractor unit tests (stdlib only, no network, no live API key)
        run: python3 -m unittest discover -s extractor/tests -t extractor

  database:
    name: Migrations + validation suites
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fte_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fte_ci
      MIN_PASS_COUNT: 382
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply migrations + register reconciler
        run: bash scripts/ci/apply_migrations.sh

      - name: Run validation suites (asserts zero errors, PASS count >= 329)
        run: bash scripts/ci/run_validations.sh

      # MVP one-command runner smoke test (Task 023C). Shell-only assertions —
      # does NOT contribute SQL PASS lines, so MIN_PASS_COUNT stays 379. The CI
      # postgres service is disposable, so the runner's disposable-test guard is
      # satisfied by setting the label for this step only.
      - name: MVP runner smoke test (scripts/mvp/run_mvp.sh)
        env:
          FTE_DB_TARGET_LABEL: disposable-test
        run: bash tests/validate_mvp_runner.sh

      # Task 023E: generate the MVP Financial Truth Report to a stable path and
      # publish it as a CI artifact, so it can be reviewed without local DB
      # credentials. Read-only demo run; no SQL PASS lines, no floor change.
      - name: Generate MVP Financial Truth Report (CI artifact)
        env:
          FTE_DB_TARGET_LABEL: disposable-test
        run: bash scripts/mvp/run_mvp.sh mvp_output/financial_truth_report_ci.md

      - name: Upload MVP Financial Truth Report artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-truth-mvp-report
          path: mvp_output/financial_truth_report_ci.md
